<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
<title>WINJAR ⚽</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#070A0E; --bg2:#0C1016; --card:#141A23; --card2:#1A212C; --line:#222B37; --line2:#2C3645;
    --txt:#EEF2F6; --muted:#7C899A; --muted2:#566273;
    --green:#19DC86; --green-dim:#0E9159; --green-ink:#04130C; --odd:#1C2530;
    --fun:#F5AE3C; --save:#33D8AA; --live:#FF4D5E;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;background:var(--bg);}
  body{font-family:'Heebo',system-ui,sans-serif;color:var(--txt);-webkit-font-smoothing:antialiased;
    max-width:520px;margin:0 auto;min-height:100vh;padding-bottom:150px;position:relative;
    background-image:radial-gradient(1200px 420px at 50% -160px, rgba(25,220,134,.08), transparent 70%);}
  .tnum{font-variant-numeric:tabular-nums;}

  .topbar{position:sticky;top:0;z-index:30;background:rgba(7,10,14,.86);backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);padding:13px 15px;display:flex;align-items:center;justify-content:space-between;}
  .brand{font-weight:900;font-size:21px;letter-spacing:.4px;direction:ltr;}
  .brand b{color:var(--green);}
  .wallets{display:flex;gap:8px;}
  .wchip{display:flex;align-items:center;gap:5px;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:6px 11px;font-weight:800;font-size:13px;}
  .wchip.fun{color:var(--fun);} .wchip.save{color:var(--save);}

  .screen{padding:14px;display:none;} .screen.active{display:block;}
  h3.sec{font-size:12px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin:16px 2px 11px;display:flex;align-items:center;gap:7px;}
  h3.sec .fire{color:var(--fun);}

  /* hot carousel */
  .hot{display:flex;gap:10px;overflow-x:auto;padding:2px 0 8px;scroll-snap-type:x mandatory;scrollbar-width:none;}
  .hot::-webkit-scrollbar{display:none;}
  .hotc{flex:0 0 200px;scroll-snap-align:start;background:linear-gradient(160deg,var(--card2),var(--card));
    border:1px solid var(--line);border-radius:15px;padding:11px 12px;cursor:pointer;position:relative;overflow:hidden;}
  .hotc::before{content:"";position:absolute;inset:0;background:radial-gradient(120px 60px at 100% 0,rgba(25,220,134,.10),transparent 70%);}
  .hot-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;position:relative;}
  .hot-lg{font-size:10px;font-weight:800;color:var(--green);letter-spacing:.3px;}
  .hot-row{display:flex;align-items:center;gap:7px;margin-bottom:7px;position:relative;}
  .hot-row .crest{width:22px;height:22px;}
  .hot-row .nm{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
  .hot-odds{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-top:9px;position:relative;}

  .leagues{display:flex;gap:8px;overflow-x:auto;padding:2px 0 4px;margin-bottom:8px;scrollbar-width:none;}
  .leagues::-webkit-scrollbar{display:none;}
  .lchip{flex:0 0 auto;background:var(--card);border:1px solid var(--line);color:var(--muted);border-radius:999px;padding:8px 15px;font-weight:700;font-size:13.5px;cursor:pointer;white-space:nowrap;}
  .lchip.on{background:var(--green);color:var(--green-ink);border-color:var(--green);}

  .mbar{display:flex;align-items:center;gap:8px;margin-bottom:9px;}
  .mbar #liveStatus{flex:1;margin:0;}
  .refresh{flex:0 0 auto;background:var(--card);border:1px solid var(--line);color:var(--txt);border-radius:10px;padding:8px 12px;font-family:inherit;font-weight:700;font-size:13px;cursor:pointer;}
  .seg{display:flex;gap:7px;margin-bottom:11px;}
  .segb{flex:0 0 auto;background:var(--card);border:1px solid var(--line);color:var(--muted);border-radius:999px;padding:7px 14px;font-family:inherit;font-weight:700;font-size:13px;cursor:pointer;}
  .segb.on{background:var(--bg2);color:var(--txt);border-color:var(--green);}

  /* 2-col grid */
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .gcard{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:11px;cursor:pointer;transition:border-color .15s,transform .07s;}
  .gcard:active{transform:scale(.985);}
  .gcard.islive{border-color:#5a2730;}
  .gc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;}
  .gc-lg{font-size:10px;font-weight:800;color:var(--green);letter-spacing:.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:60%;}
  .gc-time{font-size:10.5px;color:var(--muted);}
  .gc-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
  .gc-row .crest{width:24px;height:24px;}
  .gc-row .nm{font-size:13.5px;font-weight:700;line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
  .gc-odds{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-top:9px;}
  .chip-odd{background:var(--odd);border:1px solid var(--line);border-radius:9px;padding:6px 3px;cursor:pointer;color:var(--txt);font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:1px;}
  .chip-odd .lab{font-size:9.5px;color:var(--muted);font-weight:700;}
  .chip-odd .val{font-size:13.5px;font-weight:900;}
  .chip-odd.sel{background:var(--green);border-color:var(--green);} .chip-odd.sel .lab{color:#0a3b25;} .chip-odd.sel .val{color:var(--green-ink);}

  .live{display:inline-flex;align-items:center;gap:5px;color:var(--live);font-weight:900;font-size:10.5px;letter-spacing:.4px;}
  .live .dot{width:6px;height:6px;border-radius:50%;background:var(--live);animation:blink 1s infinite;}
  @keyframes blink{50%{opacity:.25;}}

  .crest{flex:0 0 auto;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;color:#fff;background-size:cover;background-position:center;}
  .crest.has-img{background-color:transparent!important;background-size:contain;background-repeat:no-repeat;color:transparent;}
  .crest.flag{background-color:transparent!important;background-size:cover;color:transparent;box-shadow:inset 0 0 0 1px var(--line2);}

  .hint{background:var(--card);border:1px dashed var(--line);border-radius:14px;padding:18px 16px;color:var(--muted);font-size:14px;line-height:1.6;text-align:center;}
  .hint code{background:var(--bg2);color:var(--green);padding:2px 7px;border-radius:6px;font-size:13px;}
  .status{font-size:13px;padding:9px 11px;border-radius:11px;line-height:1.5;}
  .status.err{background:#2a1414;color:#ff8a82;border:1px solid #4a1f1f;}
  .status.ok{background:#0f2018;color:var(--green);border:1px solid #1c3a2a;}
  .status.muted{background:transparent;color:var(--muted);padding-inline:2px;}
  .empty{text-align:center;color:var(--muted);font-size:14px;padding:26px 10px;line-height:1.6;grid-column:1/-1;}

  /* match detail */
  .det-back{background:none;border:none;color:var(--muted);font-family:inherit;font-weight:700;font-size:14px;cursor:pointer;padding:4px 0 12px;display:flex;align-items:center;gap:6px;}
  .det-head{background:linear-gradient(165deg,var(--card2),var(--card));border:1px solid var(--line);border-radius:18px;padding:18px 14px;margin-bottom:14px;}
  .det-meta{text-align:center;font-size:11.5px;color:var(--green);font-weight:800;letter-spacing:.4px;margin-bottom:14px;}
  .det-vs{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;direction:ltr;}
  .det-side{display:flex;flex-direction:column;align-items:center;gap:7px;text-align:center;}
  .det-side .crest{width:54px;height:54px;font-size:15px;}
  .det-side .nm{font-weight:800;font-size:15px;line-height:1.2;}
  .det-side .ha{font-size:10px;font-weight:800;color:var(--muted);letter-spacing:1px;}
  .det-mid{font-weight:900;font-size:15px;color:var(--muted2);}
  .det-mid .t{font-size:11px;font-weight:700;color:var(--muted);margin-top:3px;}

  .market{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:12px;}
  .market h4{margin:0 0 11px;font-size:13.5px;font-weight:800;color:var(--txt);}
  .market .sub{font-size:11px;color:var(--muted);font-weight:600;margin-inline-start:6px;}
  .mkrow{display:grid;gap:8px;}
  .mkrow.c3{grid-template-columns:1fr 1fr 1fr;direction:ltr;} .mkrow.c2{grid-template-columns:1fr 1fr;}
  .oddbtn{background:var(--odd);border:1px solid var(--line2);border-radius:12px;padding:12px 6px;cursor:pointer;color:var(--txt);font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:3px;transition:transform .07s;}
  .oddbtn:active{transform:scale(.96);}
  .oddbtn .lab{font-size:11.5px;color:var(--muted);font-weight:700;}
  .oddbtn .val{font-size:19px;font-weight:900;}
  .oddbtn.sel{background:var(--green);border-color:var(--green);} .oddbtn.sel .lab{color:#0a3b25;} .oddbtn.sel .val{color:var(--green-ink);}
  .mkempty{color:var(--muted);font-size:13px;text-align:center;padding:6px;}

  /* my bets / goals / slip / nav (shared) */
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;text-align:center;margin-bottom:6px;}
  .stat-v{font-weight:900;font-size:23px;} .stat-l{font-size:11px;color:var(--muted);margin-top:1px;}
  .bet{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 13px;margin-bottom:10px;}
  .bet.settled{opacity:.72;}
  .bet-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:10px;}
  .bet-desc{font-weight:700;font-size:14.5px;line-height:1.4;} .bet-meta{font-size:12px;color:var(--muted);margin-top:3px;}
  .bet-odds{font-weight:900;font-size:18px;background:var(--bg2);border-radius:9px;padding:5px 10px;white-space:nowrap;}
  .resolve{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .rb{border-radius:10px;padding:11px;font-weight:800;font-family:inherit;font-size:14px;cursor:pointer;border:1px solid var(--line);background:var(--bg2);color:var(--txt);}
  .rb.win{background:var(--green);color:var(--green-ink);border-color:var(--green);}
  .rb.lose{background:transparent;color:var(--save);border-color:var(--save);}
  .tag{font-size:12px;font-weight:800;padding:3px 9px;border-radius:8px;}
  .tag.won{background:#0f2018;color:var(--green);} .tag.lost{background:#10221c;color:var(--save);}
  .acc-pill{display:inline-block;font-size:10px;font-weight:800;color:var(--fun);background:#241a0c;border:1px solid #3a2a12;border-radius:6px;padding:1px 6px;margin-inline-start:6px;}

  .jar{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:15px;margin-bottom:11px;}
  .jar-h{display:flex;justify-content:space-between;align-items:baseline;}
  .jar-name{font-weight:800;font-size:15px;}
  .jar-val{font-weight:900;font-size:26px;} .jar-val.fun{color:var(--fun);} .jar-val.save{color:var(--save);}
  .jar-goal{font-size:12.5px;color:var(--muted);margin-top:2px;}
  .bar{height:9px;border-radius:99px;background:var(--bg2);margin-top:11px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:99px;transition:width .6s cubic-bezier(.2,.8,.2,1);}
  .banner{display:flex;align-items:center;gap:9px;border-radius:13px;padding:13px;margin-bottom:11px;font-weight:700;font-size:14px;line-height:1.4;}
  .banner.fun{background:#241a0c;color:var(--fun);border:1px solid #3a2a12;}
  .banner.save{background:#0f221c;color:var(--save);border:1px solid #1c3a30;}
  .banner button{margin-inline-start:auto;border:none;border-radius:9px;padding:8px 13px;font-weight:800;font-family:inherit;font-size:13px;cursor:pointer;white-space:nowrap;}
  .banner.fun button{background:var(--fun);color:#241a0c;} .banner.save button{background:var(--save);color:#0f221c;}
  label.fl{display:block;font-size:12.5px;color:var(--muted);margin-bottom:5px;font-weight:700;}
  .field{margin-bottom:11px;} .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  input,select{width:100%;background:var(--bg2);border:1px solid var(--line);border-radius:11px;padding:11px 12px;font-size:16px;font-family:inherit;color:var(--txt);outline:none;}
  input:focus{border-color:var(--green);}
  .ghost{background:none;border:none;color:var(--muted);font-family:inherit;font-size:13px;cursor:pointer;padding:8px 2px;}

  .add-fab{position:fixed;bottom:80px;left:14px;z-index:42;width:54px;height:54px;border-radius:50%;background:var(--green);color:var(--green-ink);border:none;font-size:31px;font-weight:300;line-height:1;cursor:pointer;box-shadow:0 8px 22px rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;}
  .add-fab:active{transform:scale(.94);}
  .slip-fab{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:40;width:auto;max-width:66%;background:var(--green);color:var(--green-ink);border:none;border-radius:13px;padding:13px 22px;font-family:inherit;font-weight:900;font-size:15px;display:none;align-items:center;gap:10px;cursor:pointer;box-shadow:0 8px 24px rgba(0,0,0,.5);white-space:nowrap;}
  .slip-fab.show{display:flex;}
  .slip-fab .cnt{background:var(--green-ink);color:var(--green);border-radius:8px;padding:2px 9px;font-size:13px;}
  .sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:50;display:none;} .sheet-bg.show{display:block;}
  .sheet{position:fixed;bottom:0;left:50%;width:100%;max-width:520px;z-index:51;background:var(--bg2);border-top-left-radius:22px;border-top-right-radius:22px;padding:16px 16px 24px;border-top:1px solid var(--line);transform:translateX(-50%) translateY(100%);transition:transform .28s ease;max-height:84vh;overflow-y:auto;}
  .sheet.show{transform:translateX(-50%) translateY(0);}
  .sheet-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;} .sheet-h h3{margin:0;font-size:17px;font-weight:900;}
  .sel-item{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 12px;margin-bottom:9px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
  .sel-item .x{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;font-family:inherit;line-height:1;}
  .slip-sum{background:var(--card);border-radius:12px;padding:12px;font-size:13.5px;color:var(--muted);line-height:1.7;margin:4px 0 12px;} .slip-sum b{color:var(--txt);font-weight:800;}
  .place{width:100%;background:var(--green);color:var(--green-ink);border:none;border-radius:13px;padding:15px;font-weight:900;font-size:16px;font-family:inherit;cursor:pointer;} .place:disabled{opacity:.4;}
  .nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;z-index:45;background:rgba(7,10,14,.96);backdrop-filter:blur(10px);border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(3,1fr);}
  .navb{background:none;border:none;color:var(--muted);font-family:inherit;font-size:11.5px;font-weight:700;padding:10px 4px 12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;border-top:2px solid transparent;}
  .navb .ic{font-size:19px;line-height:1;} .navb.on{color:var(--green);border-top-color:var(--green);}
  .toast{position:fixed;bottom:155px;left:50%;transform:translateX(-50%);background:var(--green-ink);color:var(--green);border:1px solid var(--green-dim);padding:11px 18px;border-radius:12px;font-weight:800;font-size:14px;z-index:60;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;} .toast.show{opacity:1;}
  @media (prefers-reduced-motion: reduce){.bar-fill,.sheet,.toast{transition:none;}.live .dot{animation:none;}}
</style>
</head>
<body>

  <div class="topbar">
    <div class="brand">WIN<b>JAR</b> ⚽</div>
    <div class="wallets">
      <div class="wchip fun">🎁 <span id="wFun" class="tnum">0</span></div>
      <div class="wchip save">🐷 <span id="wSave" class="tnum">0</span></div>
    </div>
  </div>

  <!-- MATCHES -->
  <div class="screen active" id="scrMatches">
    <div id="liveWrap" style="display:none"><h3 class="sec"><span class="live"><span class="dot"></span></span> משחקים חיים עכשיו</h3><div class="hot" id="liveStrip"></div></div>
    <h3 class="sec">ליגות</h3>
    <div class="leagues" id="leagues"></div>
    <div class="mbar"><div id="liveStatus" class="status muted">טוען…</div><button class="refresh" id="refreshBtn">↻ רענן</button></div>
    <div class="seg"><button class="segb on" data-f="all">כל המשחקים</button><button class="segb" data-f="live">🔴 לייב</button></div>
    <div class="grid2" id="matches"></div>
  </div>

  <!-- DETAIL -->
  <div class="screen" id="scrDetail">
    <button class="det-back" id="detBack">← חזרה למשחקים</button>
    <div id="detContent"></div>
  </div>

  <!-- MY BETS -->
  <div class="screen" id="scrBets">
    <div class="stats">
      <div><div class="stat-v" id="stCount">0</div><div class="stat-l">ניחושים</div></div>
      <div><div class="stat-v" id="stRate" style="color:var(--green)">0%</div><div class="stat-l">הצלחה</div></div>
      <div><div class="stat-v" id="stWL" style="color:var(--save)">0-0</div><div class="stat-l">נצח-הפסד</div></div>
    </div>
    <h3 class="sec">פתוחים</h3><div id="pending"></div>
    <h3 class="sec">היסטוריה</h3><div id="history"></div>
  </div>

  <!-- GOALS -->
  <div class="screen" id="scrGoals">
    <div id="goalBanners"></div>
    <div class="jar"><div class="jar-h"><div class="jar-name">🎁 קופת כיף</div><div class="jar-val fun"><span id="gFunVal" class="tnum">0</span> ₪</div></div><div class="jar-goal" id="gFunGoalT"></div><div class="bar"><div class="bar-fill" id="gFunBar" style="background:var(--fun);width:0%"></div></div></div>
    <div class="jar"><div class="jar-h"><div class="jar-name">🐷 חיסכון</div><div class="jar-val save"><span id="gSaveVal" class="tnum">0</span> ₪</div></div><div class="jar-goal" id="gSaveGoalT"></div><div class="bar"><div class="bar-fill" id="gSaveBar" style="background:var(--save);width:0%"></div></div></div>
    <h3 class="sec">הגדרות יעדים</h3>
    <div class="jar">
      <div class="field"><label class="fl">הפינוק שמחכה לך</label><input id="inTreat" type="text" /></div>
      <div class="row2"><div class="field"><label class="fl">פינוק ב־(₪)</label><input id="inFun" type="number" /></div><div class="field"><label class="fl">יעד חיסכון (₪)</label><input id="inSave" type="number" /></div></div>
    </div>
    <button class="ghost" id="resetBtn">↺ אפס הכל</button>
  </div>

  <button class="add-fab" id="addFab" aria-label="הוספה ידנית">+</button>

  <!-- slip -->
  <button class="slip-fab" id="slipFab"><span>סל ההימורים</span><span class="cnt" id="slipCnt">0</span></button>
  <div class="sheet-bg" id="sheetBg"></div>
  <div class="sheet" id="sheet">
    <div class="sheet-h"><h3>סל ההימורים</h3><button class="ghost" id="sheetClose">סגור ✕</button></div>
    <div class="seg" id="slipModeSeg" style="margin-bottom:12px"><button class="segb on" data-mode="single">סינגלים</button><button class="segb" data-mode="acc">טור (מצרף)</button></div>
    <div id="slipItems"></div>
    <div class="field"><label class="fl" id="stakeLabel">סכום לכל ניחוש (₪)</label><input id="slipStake" type="number" inputmode="decimal" value="50" /></div>
    <div class="slip-sum" id="slipSum"></div>
    <button class="place" id="placeBtn">הצב ניחושים</button>
  </div>

  <!-- manual -->
  <div class="sheet-bg" id="manualBg"></div>
  <div class="sheet" id="manualSheet">
    <div class="sheet-h"><h3>הוספה ידנית</h3><button class="ghost" id="manualClose">סגור ✕</button></div>
    <div class="field"><label class="fl">תיאור הניחוש</label><input id="manDesc" type="text" placeholder="Maccabi vs Hapoel — ניצחון בית" /></div>
    <div class="field"><label class="fl">יחס</label><input id="manOdds" type="number" inputmode="decimal" step="0.01" placeholder="2.50" /></div>
    <button class="place" id="manAdd">הוסף לסל</button>
  </div>

  <div class="nav">
    <button class="navb on" data-scr="scrMatches"><span class="ic">⚽</span>משחקים</button>
    <button class="navb" data-scr="scrBets"><span class="ic">🎫</span>ההימורים שלי</button>
    <button class="navb" data-scr="scrGoals"><span class="ic">🎯</span>יעדים</button>
  </div>

<script>
"use strict";
/* ============================================================
   מפתח ה-API מ-the-odds-api.com: ============================================================ */
var API_KEY = "947dffb15ac249ce1355bb02d4bd27e4";
/* ============================================================ */

var REGION="eu";
var CACHE_TTL_MIN=15, LIVE_TTL_MIN=2, SPORTS_TTL_MIN=720, EVENT_TTL_MIN=15, HOT_TTL_MIN=30, CREST_TTL_MIN=10080;

var ORDER=["soccer_epl","soccer_spain_la_liga","soccer_italy_serie_a","soccer_germany_bundesliga","soccer_france_ligue_one","soccer_uefa_champs_league","soccer_fifa_world_cup","soccer_israel_ligat_haal"];
var PRETTY={soccer_epl:"Premier League",soccer_uefa_champs_league:"Champions League",soccer_fifa_world_cup:"World Cup",soccer_israel_ligat_haal:"Ligat ha'Al"};
var FALLBACK=[{key:"soccer_epl",title:"Premier League"},{key:"soccer_spain_la_liga",title:"La Liga"},{key:"soccer_italy_serie_a",title:"Serie A"},{key:"soccer_germany_bundesliga",title:"Bundesliga"},{key:"soccer_france_ligue_one",title:"Ligue 1"},{key:"soccer_uefa_champs_league",title:"Champions League"},{key:"soccer_fifa_world_cup",title:"World Cup"},{key:"soccer_israel_ligat_haal",title:"Ligat ha'Al"}];
var HOT_PREF=["soccer_uefa_champs_league","soccer_fifa_world_cup","soccer_epl","soccer_spain_la_liga","soccer_italy_serie_a"];
// TheSportsDB leagues to harvest crests from (free), merged into one global map
var CREST_LEAGUES=["English Premier League","Spanish La Liga","Italian Serie A","German Bundesliga","French Ligue 1","UEFA Champions League","Dutch Eredivisie","Portuguese Primeira Liga","English League Championship","Israeli Premier League","Brazilian Serie A","American Major League Soccer","Mexican Liga MX","Turkish Super Lig","Belgian First Division A","Scottish Premiership","Greek Super League","Saudi Pro League"];

var SKEY="winjar_v2", CKEY="winjar_cache_v2";
var DEFAULT={predictions:[],funBalance:0,savingsBalance:0,goal:{funAmount:500,treat:"פינוק שבחרת",saveAmount:1000},redemptions:[]};
var state=loadState(), cache=loadCache();
var slip=[], leagues=FALLBACK.slice(), curLeague=leagues[0].key, liveOnly=false, slipMode="single", detailCtx=null;

function loadState(){try{var r=localStorage.getItem(SKEY);if(r)return Object.assign({},DEFAULT,JSON.parse(r));}catch(e){}return JSON.parse(JSON.stringify(DEFAULT));}
function save(){try{localStorage.setItem(SKEY,JSON.stringify(state));}catch(e){}}
function loadCache(){try{var r=localStorage.getItem(CKEY);if(r)return JSON.parse(r);}catch(e){}return {odds:{},events:{},sports:null,remaining:null,crest:null};}
function saveCache(){try{localStorage.setItem(CKEY,JSON.stringify(cache));}catch(e){}}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function nis(n){return new Intl.NumberFormat("he-IL",{maximumFractionDigits:0}).format(Math.round(n||0));}
function el(id){return document.getElementById(id);}
function esc(t){return String(t).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
function ago(ts){var s=(Date.now()-ts)/1000;if(s<60)return "עכשיו";var m=Math.floor(s/60);if(m<60)return "לפני "+m+" ד׳";return "לפני "+Math.floor(m/60)+" ש׳";}
function fresh(ts,ttl){return ts&&(Date.now()-ts)<ttl*60000;}
function toast(msg){var t=el("toast");t.textContent=msg;t.classList.add("show");clearTimeout(t._h);t._h=setTimeout(function(){t.classList.remove("show");},1800);}
function isLive(m){return new Date(m.commence_time).getTime()<Date.now();}
function hasLive(d){return (d||[]).some(isLive);}
function shortTime(iso){var t=new Date(iso);return t.toLocaleString("he-IL",{day:"numeric",month:"numeric",hour:"2-digit",minute:"2-digit"});}

/* crests */
var ISO={"germany":"de","spain":"es","france":"fr","england":"gb-eng","scotland":"gb-sct","wales":"gb-wls","northern ireland":"gb-nir","netherlands":"nl","belgium":"be","portugal":"pt","italy":"it","croatia":"hr","switzerland":"ch","poland":"pl","denmark":"dk","serbia":"rs","austria":"at","ukraine":"ua","czech republic":"cz","czechia":"cz","sweden":"se","norway":"no","turkey":"tr","turkiye":"tr","greece":"gr","russia":"ru","hungary":"hu","romania":"ro","ireland":"ie","slovakia":"sk","slovenia":"si","brazil":"br","argentina":"ar","uruguay":"uy","colombia":"co","chile":"cl","peru":"pe","ecuador":"ec","paraguay":"py","bolivia":"bo","venezuela":"ve","mexico":"mx","usa":"us","united states":"us","canada":"ca","costa rica":"cr","panama":"pa","honduras":"hn","jamaica":"jm","japan":"jp","south korea":"kr","korea republic":"kr","iran":"ir","saudi arabia":"sa","australia":"au","qatar":"qa","iraq":"iq","united arab emirates":"ae","uae":"ae","china":"cn","india":"in","morocco":"ma","senegal":"sn","tunisia":"tn","algeria":"dz","egypt":"eg","ghana":"gh","cameroon":"cm","nigeria":"ng","ivory coast":"ci","cote divoire":"ci","mali":"ml","south africa":"za","new zealand":"nz","israel":"il","cape verde":"cv","jordan":"jo","uzbekistan":"uz"};
function countryISO(name){var k=String(name||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z ]/g,"").replace(/\s+/g," ").trim();return ISO[k]||null;}
function norm(s){return String(s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\b(fc|cf|afc|sc|ac|cd|ssc|as|us|rc|sv|bk|if|club|de)\b/g," ").replace(/[^a-z0-9]/g,"");}
function initials(name){var w=String(name).replace(/[^A-Za-z\u00C0-\u024F\s]/g," ").trim().split(/\s+/).filter(Boolean);if(w.length>=2)return (w[0][0]+w[1][0]).toUpperCase();return String(name).replace(/\s/g,"").slice(0,2).toUpperCase();}
function teamColor(name){var h=0,s=String(name);for(var i=0;i<s.length;i++)h=s.charCodeAt(i)+((h<<5)-h);return "hsl("+(Math.abs(h)%360)+",50%,40%)";}
function crestHtml(name){var iso=countryISO(name);if(iso)return '<span class="crest flag" style="background-image:url(https://flagcdn.com/w160/'+iso+'.png)"></span>';return '<span class="crest" data-team="'+esc(name)+'" style="background-color:'+teamColor(name)+'">'+esc(initials(name))+'</span>';}
function crestMap(){return (cache.crest&&cache.crest.map)||{};}
async function ensureCrests(){
  if(cache.crest&&fresh(cache.crest.ts,CREST_TTL_MIN)&&cache.crest.map&&Object.keys(cache.crest.map).length) return;
  if(!API_KEY) return;
  var map=(cache.crest&&cache.crest.map)||{};
  for(var i=0;i<CREST_LEAGUES.length;i++){
    try{
      var res=await fetch("https://www.thesportsdb.com/api/v1/json/123/search_all_teams.php?l="+encodeURIComponent(CREST_LEAGUES[i]));
      if(!res.ok) continue; var j=await res.json(); var teams=(j&&j.teams)||[];
      teams.forEach(function(t){var b=t.strBadge||t.strTeamBadge;if(!b)return;if(t.strTeam){var n=norm(t.strTeam);if(n)map[n]=b;}if(t.strAlternate){String(t.strAlternate).split(",").forEach(function(a){var n2=norm(a);if(n2&&!map[n2])map[n2]=b;});}});
    }catch(e){}
  }
  cache.crest={ts:Date.now(),map:map}; saveCache(); applyCrests();
}
function applyCrests(){var map=crestMap();var nodes=document.querySelectorAll('.crest[data-team]');for(var i=0;i<nodes.length;i++){var url=map[norm(nodes[i].getAttribute("data-team"))];if(url){nodes[i].style.backgroundImage="url('"+url+"')";nodes[i].classList.add("has-img");nodes[i].textContent="";}}}

/* ---------- jars / bets ---------- */
function renderWallets(){el("wFun").textContent=nis(state.funBalance);el("wSave").textContent=nis(state.savingsBalance);}
function renderGoals(){var g=state.goal;el("gFunVal").textContent=nis(state.funBalance);el("gSaveVal").textContent=nis(state.savingsBalance);el("gFunGoalT").textContent="פינוק ב־"+nis(g.funAmount)+" ₪";el("gSaveGoalT").textContent="יעד: "+nis(g.saveAmount)+" ₪";el("gFunBar").style.width=Math.min(100,g.funAmount?state.funBalance/g.funAmount*100:0)+"%";el("gSaveBar").style.width=Math.min(100,g.saveAmount?state.savingsBalance/g.saveAmount*100:0)+"%";var b="";if(g.funAmount>0&&state.funBalance>=g.funAmount)b+='<div class="banner fun">✨ <span>הגעת ל'+nis(g.funAmount)+' ₪ — מגיע לך '+esc(g.treat)+'!</span><button data-act="redeem">ממש</button></div>';if(g.saveAmount>0&&state.savingsBalance>=g.saveAmount)b+='<div class="banner save">🐷 <span>חסכת '+nis(g.saveAmount)+' ₪. הכסף נשאר שלך.</span><button data-act="bump">העלה יעד</button></div>';el("goalBanners").innerHTML=b;}
function renderBets(){
  var pend=state.predictions.filter(function(p){return p.status==="pending";});
  el("pending").innerHTML=pend.length?pend.map(function(p){return '<div class="bet"><div class="bet-top"><div><div class="bet-desc">'+esc(p.desc)+(p.acc?'<span class="acc-pill">טור</span>':'')+'</div><div class="bet-meta">'+nis(p.stake)+' ₪ · יחס '+p.odds+' · החזר אפשרי '+nis(p.stake*p.odds)+' ₪</div></div><div class="bet-odds tnum">'+p.odds+'</div></div><div class="resolve"><button class="rb win" data-win="'+p.id+'">✓ ניצחתי</button><button class="rb lose" data-lose="'+p.id+'">✕ הפסדתי</button></div></div>';}).join(""):'<div class="empty">אין ניחושים פתוחים.</div>';
  var settled=state.predictions.filter(function(p){return p.status!=="pending";}),hist="";
  state.redemptions.forEach(function(r){hist+='<div class="bet settled"><div class="bet-top"><div><div class="bet-desc">🎁 מימשת: '+esc(r.treat)+'</div><div class="bet-meta">−'+nis(r.amount)+' ₪ מקופת הכיף</div></div></div></div>';});
  settled.slice(0,40).forEach(function(p){var won=p.status==="won";hist+='<div class="bet settled"><div class="bet-top"><div><div class="bet-desc">'+esc(p.desc)+(p.acc?'<span class="acc-pill">טור</span>':'')+'</div><div class="bet-meta">'+(won?("+"+nis(p.payout)+" ₪ לקופת הכיף"):("+"+nis(p.stake)+" ₪ לחיסכון"))+'</div></div><span class="tag '+(won?"won":"lost")+'">'+(won?"זכייה":"לחיסכון")+'</span></div></div>';});
  el("history").innerHTML=hist||'<div class="empty">עוד אין היסטוריה.</div>';
  var wins=settled.filter(function(p){return p.status==="won";}).length,losses=settled.filter(function(p){return p.status==="lost";}).length;
  el("stCount").textContent=settled.length;el("stRate").textContent=(settled.length?Math.round(wins/settled.length*100):0)+"%";el("stWL").textContent=wins+"-"+losses;
}
function renderAll(){renderWallets();renderGoals();renderBets();save();}
function resolve(id,won){state.predictions=state.predictions.map(function(p){if(p.id!==id||p.status!=="pending")return p;if(won){var pay=Math.round(p.stake*p.odds);state.funBalance+=pay;return Object.assign({},p,{status:"won",payout:pay,resolvedAt:Date.now()});}state.savingsBalance+=p.stake;return Object.assign({},p,{status:"lost",resolvedAt:Date.now()});});renderAll();}

/* ---------- slip ---------- */
function inSlipId(selId){return slip.findIndex(function(s){return s.selId===selId;});}
function toggleSel(eid,mkt,out,label,odds){
  var selId=eid+"|"+mkt+"|"+out;
  var i=inSlipId(selId);
  if(i>=0){slip.splice(i,1);}
  else{var j=slip.findIndex(function(s){return s.eventId===eid&&s.market===mkt;});var item={selId:selId,eventId:eid,market:mkt,out:out,label:label,odds:odds};if(j>=0)slip[j]=item;else slip.push(item);}
  renderSlip();markSelected();
}
function renderSlip(){
  el("slipCnt").textContent=slip.length;el("slipFab").classList.toggle("show",slip.length>0);
  el("slipItems").innerHTML=slip.map(function(s,idx){return '<div class="sel-item"><div><div class="bet-desc">'+esc(s.label)+'</div><div class="bet-meta">יחס '+s.odds+'</div></div><button class="x" data-rm="'+idx+'">✕</button></div>';}).join("");
  var stake=parseFloat(el("slipStake").value)||0;
  if(slipMode==="acc"){
    var comb=slip.reduce(function(a,s){return a*parseFloat(s.odds);},1);
    el("stakeLabel").textContent="סכום הטור (₪)";
    el("slipSum").innerHTML=slip.length?'טור של '+slip.length+' בחירות · יחס מצרף <b>'+comb.toFixed(2)+'</b>.<br>כולן חייבות לנצח. ניצחת? <b>+'+nis(stake*comb)+' ₪</b> לקופת הכיף.<br>בחירה אחת מפסידה = הטור הפסיד → <b>+'+nis(stake)+' ₪</b> לחיסכון.':'הסל ריק.';
    el("placeBtn").disabled=slip.length<1||!(stake>0);
  }else{
    var tot=slip.reduce(function(a,s){return a+stake*parseFloat(s.odds);},0);
    el("stakeLabel").textContent="סכום לכל ניחוש (₪)";
    el("slipSum").innerHTML=slip.length?'כל ניחוש בנפרד, '+nis(stake)+' ₪ כל אחד.<br>אם הכל ינצח: <b>+'+nis(tot)+' ₪</b> לקופת הכיף.<br>כל הפסד: <b>+'+nis(stake)+' ₪</b> לחיסכון.':'הסל ריק.';
    el("placeBtn").disabled=slip.length===0||!(stake>0);
  }
}
function openSheet(){el("sheetBg").classList.add("show");el("sheet").classList.add("show");}
function closeSheet(){el("sheetBg").classList.remove("show");el("sheet").classList.remove("show");}
function placeBets(){
  var stake=parseFloat(el("slipStake").value)||0;if(!(stake>0)||slip.length===0)return;
  if(slipMode==="acc"){
    var comb=slip.reduce(function(a,s){return a*parseFloat(s.odds);},1);
    var desc="טור: "+slip.map(function(s){return s.label;}).join("  +  ");
    state.predictions.unshift({id:uid(),desc:desc,stake:stake,odds:parseFloat(comb.toFixed(2)),status:"pending",createdAt:Date.now(),acc:true});
    toast("טור הוצב 🎟️");
  }else{
    slip.forEach(function(s){state.predictions.unshift({id:uid(),desc:s.label,stake:stake,odds:parseFloat(s.odds),status:"pending",createdAt:Date.now()});});
    toast(slip.length>1?slip.length+" ניחושים הוצבו":"ניחוש הוצב");
  }
  slip=[];renderSlip();markSelected();renderAll();closeSheet();switchScreen("scrBets");
}
function openManual(){el("manualBg").classList.add("show");el("manualSheet").classList.add("show");}
function closeManual(){el("manualBg").classList.remove("show");el("manualSheet").classList.remove("show");}
function manualAdd(){var d=el("manDesc").value.trim(),o=parseFloat(el("manOdds").value);if(!d||!(o>1)){toast("צריך תיאור ויחס מעל 1");return;}var eid="manual_"+uid();slip.push({selId:eid+"|m|x",eventId:eid,market:"m",out:"x",label:d,odds:o.toFixed(2)});el("manDesc").value="";el("manOdds").value="";renderSlip();markSelected();closeManual();openSheet();}

/* ---------- leagues (free) ---------- */
function leagueName(k){for(var i=0;i<leagues.length;i++)if(leagues[i].key===k)return leagues[i].title;return PRETTY[k]||k;}
function renderLeagues(){el("leagues").innerHTML=leagues.map(function(l){return '<button class="lchip'+(l.key===curLeague?" on":"")+'" data-lg="'+esc(l.key)+'">'+esc(l.title)+'</button>';}).join("");}
function prettyTitle(s){if(PRETTY[s.key])return PRETTY[s.key];return String(s.title||s.key).split(" - ")[0];}
function buildLeagues(list){var out=list.filter(function(s){return s.group==="Soccer"&&s.active!==false&&!s.has_outrights&&s.key.indexOf("_winner")<0;}).map(function(s){return {key:s.key,title:prettyTitle(s)};});out.sort(function(a,b){var ia=ORDER.indexOf(a.key),ib=ORDER.indexOf(b.key);ia=ia<0?999:ia;ib=ib<0?999:ib;return ia!==ib?ia-ib:a.title.localeCompare(b.title);});return out;}
async function loadSports(){
  if(cache.sports&&fresh(cache.sports.ts,SPORTS_TTL_MIN)&&cache.sports.data){var b=buildLeagues(cache.sports.data);if(b.length)leagues=b;}
  if(API_KEY){try{var res=await fetch("https://api.the-odds-api.com/v4/sports/?apiKey="+encodeURIComponent(API_KEY)+"&all=false");if(res.ok){var data=await res.json();cache.sports={ts:Date.now(),data:data};saveCache();var b2=buildLeagues(data);if(b2.length)leagues=b2;}}catch(e){}}
  if(!leagues.length)leagues=FALLBACK.slice();
  if(!leagues.some(function(l){return l.key===curLeague;}))curLeague=leagues[0].key;
  renderLeagues();
}

/* ---------- odds parsing ---------- */
function avgH2H(match){var sums={},counts={};(match.bookmakers||[]).forEach(function(bk){(bk.markets||[]).forEach(function(mk){if(mk.key!=="h2h")return;(mk.outcomes||[]).forEach(function(o){sums[o.name]=(sums[o.name]||0)+o.price;counts[o.name]=(counts[o.name]||0)+1;});});});var out={};Object.keys(sums).forEach(function(n){out[n]=sums[n]/counts[n];});return out;}
function setStatus(cls,html){var s=el("liveStatus");s.className="status "+cls;s.innerHTML=html;}
function creditTxt(){return cache.remaining!=null?" · "+cache.remaining+" קרדיטים":"";}

/* ---------- league odds fetch (shared cache) ---------- */
async function fetchLeagueOdds(league,force){
  var entry=cache.odds[league];
  var ttl=(entry&&hasLive(entry.data))?LIVE_TTL_MIN:(league===curLeague?CACHE_TTL_MIN:HOT_TTL_MIN);
  if(!force&&entry&&fresh(entry.ts,ttl))return entry.data;
  try{
    var res=await fetch("https://api.the-odds-api.com/v4/sports/"+league+"/odds/?apiKey="+encodeURIComponent(API_KEY)+"&regions="+REGION+"&markets=h2h&oddsFormat=decimal");
    var rem=res.headers.get("x-requests-remaining");if(rem!=null)cache.remaining=parseInt(rem,10);
    if(!res.ok){return entry?entry.data:null;}
    var data=await res.json();cache.odds[league]={ts:Date.now(),data:data};saveCache();return data;
  }catch(e){return entry?entry.data:null;}
}

/* ---------- matches grid ---------- */
async function loadMatches(force){
  if(!API_KEY){el("matches").innerHTML='<div class="hint">הדבק את מפתח ה-API בקוד כדי לטעון משחקים.</div>';setStatus("muted","");return;}
  var entry=cache.odds[curLeague];
  var ttl=(entry&&hasLive(entry.data))?LIVE_TTL_MIN:CACHE_TTL_MIN;
  if(!force&&entry&&fresh(entry.ts,ttl)){renderMatches(entry.data);statusFor(curLeague,true);return;}
  setStatus("muted","טוען משחקים…");if(!entry)el("matches").innerHTML="";
  var data=await fetchLeagueOdds(curLeague,true);
  if(data){renderMatches(data);statusFor(curLeague,false);}
  else{if(entry&&entry.data){renderMatches(entry.data);setStatus("muted","אופליין — מציג שמור · עודכן "+ago(entry.ts));}else setStatus("err",'הטעינה נכשלה. אם אתה בצ\'אט — <b>הורד ופתח בדפדפן</b>. אחרת בדוק מפתח/רשת.');}
}
function statusFor(league,cached){var e=cache.odds[league];if(!e)return;if(!e.data.length){setStatus("muted","אין משחקים קרובים ב"+leagueName(league)+".");return;}var lc=e.data.filter(isLive).length;setStatus("ok",e.data.length+" משחקים"+(lc?" · "+lc+" לייב🔴":"")+" · עודכן "+ago(e.ts)+(cached?" (שמור)":"")+creditTxt());}
function oddEl(eid,mkt,out,label,price,cls){return '<button class="'+cls+'" data-eid="'+esc(eid)+'" data-mkt="'+esc(mkt)+'" data-out="'+esc(out)+'" data-label="'+esc(label)+'" data-odds="'+price+'"><span class="lab">'+esc(out)+'</span><span class="val tnum">'+price+'</span></button>';}
function renderMatches(data){
  renderLiveStrip(data);
  var arr=data.slice().sort(function(a,b){var la=isLive(a),lb=isLive(b);if(la!==lb)return la?-1:1;return new Date(a.commence_time)-new Date(b.commence_time);});
  if(liveOnly)arr=arr.filter(isLive);
  if(!arr.length){el("matches").innerHTML='<div class="empty">'+(liveOnly?"אין משחקי לייב כרגע.":"אין משחקים להצגה.")+'</div>';return;}
  el("matches").innerHTML=arr.slice(0,40).map(function(m){
    var od=avgH2H(m),live=isLive(m);
    function oc(out,name){var p=od[name];if(!p)return '<div class="chip-odd" style="opacity:.4"><span class="lab">'+out+'</span><span class="val">–</span></div>';return oddEl(m.id,"h2h",out,m.home_team+" נגד "+m.away_team+" · "+(name==="Draw"?"תיקו":name),p.toFixed(2),"chip-odd");}
    return '<div class="gcard'+(live?" islive":"")+'" data-card-eid="'+esc(m.id)+'" data-card-lg="'+esc(curLeague)+'"><div class="gc-top"><span class="gc-lg">'+esc(leagueName(curLeague))+'</span>'+(live?'<span class="live"><span class="dot"></span>LIVE</span>':'<span class="gc-time">'+shortTime(m.commence_time)+'</span>')+'</div>'
      +'<div class="gc-row">'+crestHtml(m.home_team)+'<span class="nm">'+esc(m.home_team)+'</span></div>'
      +'<div class="gc-row">'+crestHtml(m.away_team)+'<span class="nm">'+esc(m.away_team)+'</span></div>'
      +'<div class="gc-odds">'+oc("1",m.home_team)+oc("X","Draw")+oc("2",m.away_team)+'</div></div>';
  }).join("");
  applyCrests();markSelected();
}
function renderLiveStrip(data){
  var live=(data||[]).filter(isLive);
  if(!live.length){el("liveWrap").style.display="none";el("liveStrip").innerHTML="";return;}
  el("liveWrap").style.display="block";
  el("liveStrip").innerHTML=live.slice(0,12).map(function(m){
    var od=avgH2H(m);
    function oc(out,name){var p=od[name];if(!p)return '<div class="chip-odd" style="opacity:.4"><span class="lab">'+out+'</span><span class="val">–</span></div>';return oddEl(m.id,"h2h",out,m.home_team+" נגד "+m.away_team+" · "+(name==="Draw"?"תיקו":name),p.toFixed(2),"chip-odd");}
    return '<div class="hotc" data-card-eid="'+esc(m.id)+'" data-card-lg="'+esc(curLeague)+'"><div class="hot-top"><span class="live"><span class="dot"></span>LIVE</span><span class="hot-lg">'+esc(leagueName(curLeague))+'</span></div>'
      +'<div class="hot-row">'+crestHtml(m.home_team)+'<span class="nm">'+esc(m.home_team)+'</span></div>'
      +'<div class="hot-row">'+crestHtml(m.away_team)+'<span class="nm">'+esc(m.away_team)+'</span></div>'
      +'<div class="hot-odds">'+oc("1",m.home_team)+oc("X","Draw")+oc("2",m.away_team)+'</div></div>';
  }).join("");
  applyCrests();markSelected();
}

/* ---------- match detail (extra markets) ---------- */
function findMatch(league,eid){var e=cache.odds[league];if(!e||!e.data)return null;for(var i=0;i<e.data.length;i++)if(e.data[i].id===eid)return e.data[i];return null;}
async function openDetail(eid,league){
  var m=findMatch(league,eid);
  detailCtx={eid:eid,league:league,match:m};
  switchScreen("scrDetail");
  el("detContent").innerHTML=detailHeadHtml(m,league)+'<div class="market"><div class="mkempty">טוען יחסים…</div></div>';
  applyCrests();
  var ev=await fetchEventOdds(league,eid);
  el("detContent").innerHTML=detailHeadHtml(m,league)+detailMarketsHtml(m,ev);
  applyCrests();markSelected();
}
function detailHeadHtml(m,league){
  if(!m)return '<div class="det-head"><div class="det-meta">משחק</div></div>';
  var live=isLive(m);
  return '<div class="det-head"><div class="det-meta">'+esc(leagueName(league))+'</div><div class="det-vs">'
    +'<div class="det-side">'+crestHtml(m.home_team)+'<div class="nm">'+esc(m.home_team)+'</div><div class="ha">HOME</div></div>'
    +'<div class="det-mid">'+(live?'<span class="live"><span class="dot"></span>LIVE</span>':'VS')+'<div class="t">'+(live?'':shortTime(m.commence_time))+'</div></div>'
    +'<div class="det-side">'+crestHtml(m.away_team)+'<div class="nm">'+esc(m.away_team)+'</div><div class="ha">AWAY</div></div>'
    +'</div></div>';
}
async function fetchEventOdds(league,eid){
  var c=cache.events[eid];var live=detailCtx&&detailCtx.match&&isLive(detailCtx.match);
  if(c&&fresh(c.ts,live?LIVE_TTL_MIN:EVENT_TTL_MIN)&&c.data)return c.data;
  try{
    var res=await fetch("https://api.the-odds-api.com/v4/sports/"+league+"/events/"+eid+"/odds/?apiKey="+encodeURIComponent(API_KEY)+"&regions="+REGION+"&markets=h2h,alternate_totals,btts,double_chance,draw_no_bet&oddsFormat=decimal");
    var rem=res.headers.get("x-requests-remaining");if(rem!=null)cache.remaining=parseInt(rem,10);
    if(!res.ok)return c?c.data:null;
    var data=await res.json();cache.events[eid]={ts:Date.now(),data:data};saveCache();return data;
  }catch(e){return c?c.data:null;}
}
function parseMarkets(ev){
  var h2h={},totalsByPoint={},btts={},dc={},dnb={};
  function agg(obj,k,p){if(!obj[k])obj[k]={s:0,n:0};obj[k].s+=p;obj[k].n++;}
  function avg(slot){return slot&&slot.n?slot.s/slot.n:null;}
  var home=ev.home_team,away=ev.away_team,nh=norm(home),na=norm(away);
  (ev&&ev.bookmakers||[]).forEach(function(bk){(bk.markets||[]).forEach(function(mk){
    var ms=mk.outcomes||[];
    if(mk.key==="h2h"){ms.forEach(function(o){agg(h2h,o.name,o.price);});}
    else if(mk.key==="alternate_totals"||mk.key==="totals"){ms.forEach(function(o){var pt=String(o.point);if(!totalsByPoint[pt])totalsByPoint[pt]={Over:{s:0,n:0},Under:{s:0,n:0}};var slot=totalsByPoint[pt][o.name];if(slot){slot.s+=o.price;slot.n++;}});}
    else if(mk.key==="btts"){ms.forEach(function(o){agg(btts,o.name,o.price);});}
    else if(mk.key==="draw_no_bet"){ms.forEach(function(o){agg(dnb,o.name,o.price);});}
    else if(mk.key==="double_chance"){ms.forEach(function(o){var n=norm(o.name),hasH=n.indexOf(nh)>=0,hasA=n.indexOf(na)>=0,hasD=n.indexOf("draw")>=0;var key=hasH&&hasD?"1X":(hasA&&hasD?"X2":(hasH&&hasA?"12":null));if(key)agg(dc,key,o.price);});}
  });});
  // half-point totals only, sorted
  var totals=[];Object.keys(totalsByPoint).forEach(function(pt){var pn=parseFloat(pt);if(Math.abs(pn*2-Math.round(pn*2))<1e-9 && Math.round(pn*2)%2===1){var o=avg(totalsByPoint[pt].Over),u=avg(totalsByPoint[pt].Under);if(o&&u)totals.push({point:pn,over:o,under:u});}});
  totals.sort(function(a,b){return a.point-b.point;});
  return {
    h2h:{home:avg(h2h[home]),draw:avg(h2h["Draw"]),away:avg(h2h[away])},
    dc:{"1X":avg(dc["1X"]),"12":avg(dc["12"]),"X2":avg(dc["X2"])},
    dnb:{home:avg(dnb[home]),away:avg(dnb[away])},
    totals:totals,
    btts:{yes:avg(btts["Yes"]),no:avg(btts["No"])}
  };
}
function detailMarketsHtml(m,ev){
  if(!ev)return '<div class="market"><div class="mkempty">לא הצלחנו לטעון יחסים. אם אתה בצ\'אט — הורד ופתח בדפדפן.</div></div>';
  var P=parseMarkets(ev),eid=ev.id,html="";
  var home=ev.home_team,away=ev.away_team,vs=home+" נגד "+away;
  function dead(lab){return '<div class="oddbtn" style="opacity:.4"><span class="lab">'+lab+'</span><span class="val">–</span></div>';}
  // 1X2
  html+='<div class="market"><h4>תוצאת המשחק <span class="sub">1X2</span></h4><div class="mkrow c3">';
  html+=P.h2h.home?oddEl(eid,"h2h","1",home+" — ניצחון בית",P.h2h.home.toFixed(2),"oddbtn"):dead("1");
  html+=P.h2h.draw?oddEl(eid,"h2h","X",vs+" · תיקו",P.h2h.draw.toFixed(2),"oddbtn"):dead("X");
  html+=P.h2h.away?oddEl(eid,"h2h","2",away+" — ניצחון חוץ",P.h2h.away.toFixed(2),"oddbtn"):dead("2");
  html+='</div></div>';
  // Double chance
  if(P.dc["1X"]||P.dc["12"]||P.dc["X2"]){html+='<div class="market"><h4>צ׳אנס כפול <span class="sub">Double Chance</span></h4><div class="mkrow c3">';
    html+=P.dc["1X"]?oddEl(eid,"dc","1X",vs+" · בית או תיקו",P.dc["1X"].toFixed(2),"oddbtn"):dead("1X");
    html+=P.dc["12"]?oddEl(eid,"dc","12",vs+" · בית או חוץ",P.dc["12"].toFixed(2),"oddbtn"):dead("12");
    html+=P.dc["X2"]?oddEl(eid,"dc","X2",vs+" · תיקו או חוץ",P.dc["X2"].toFixed(2),"oddbtn"):dead("X2");
    html+='</div></div>';}
  // Draw no bet
  if(P.dnb.home&&P.dnb.away){html+='<div class="market"><h4>הימור ללא תיקו <span class="sub">DNB</span></h4><div class="mkrow c2">'
    +oddEl(eid,"dnb","בית",home+" · ללא תיקו",P.dnb.home.toFixed(2),"oddbtn")
    +oddEl(eid,"dnb","חוץ",away+" · ללא תיקו",P.dnb.away.toFixed(2),"oddbtn")+'</div></div>';}
  // Over/Under all lines
  if(P.totals.length){html+='<div class="market"><h4>סך שערים <span class="sub">Over / Under</span></h4>';
    P.totals.forEach(function(t){var pt=t.point;html+='<div class="mkrow c2" style="margin-bottom:8px">'
      +oddEl(eid,"tot_"+pt,"מעל "+pt,vs+" · מעל "+pt+" שערים",t.over.toFixed(2),"oddbtn")
      +oddEl(eid,"tot_"+pt,"מתחת "+pt,vs+" · מתחת "+pt+" שערים",t.under.toFixed(2),"oddbtn")+'</div>';});
    html+='</div>';}
  // BTTS
  if(P.btts.yes&&P.btts.no){html+='<div class="market"><h4>שתי הקבוצות יבקיעו <span class="sub">BTTS</span></h4><div class="mkrow c2">'
    +oddEl(eid,"btts","כן",vs+" · שתיהן יבקיעו: כן",P.btts.yes.toFixed(2),"oddbtn")
    +oddEl(eid,"btts","לא",vs+" · שתיהן יבקיעו: לא",P.btts.no.toFixed(2),"oddbtn")+'</div></div>';}
  html+='<div class="mkempty" style="font-size:11px;padding:2px">תוצאה מדויקת / מבקיע ראשון אינם זמינים ב-API החינמי.</div>';
  return html;
}

/* ---------- selection highlight ---------- */
function markSelected(){var b=document.querySelectorAll("[data-eid]");for(var i=0;i<b.length;i++){var selId=b[i].getAttribute("data-eid")+"|"+b[i].getAttribute("data-mkt")+"|"+b[i].getAttribute("data-out");b[i].classList.toggle("sel",inSlipId(selId)>=0);}}
function onOddClick(e){var b=e.target.closest("[data-eid]");if(!b)return;e.stopPropagation();toggleSel(b.getAttribute("data-eid"),b.getAttribute("data-mkt"),b.getAttribute("data-out"),b.getAttribute("data-label"),b.getAttribute("data-odds"));}

/* ---------- nav ---------- */
function switchScreen(id){var s=document.querySelectorAll(".screen");for(var i=0;i<s.length;i++)s[i].classList.toggle("active",s[i].id===id);var n=document.querySelectorAll(".navb");for(var j=0;j<n.length;j++)n[j].classList.toggle("on",n[j].getAttribute("data-scr")===id);el("addFab").style.display=(id==="scrMatches")?"flex":"none";window.scrollTo(0,0);}

/* ---------- init ---------- */
async function init(){
  el("inTreat").value=state.goal.treat;el("inFun").value=state.goal.funAmount;el("inSave").value=state.goal.saveAmount;
  renderLeagues();renderAll();renderSlip();applyCrests();

  el("leagues").addEventListener("click",function(e){var b=e.target.closest("[data-lg]");if(!b)return;curLeague=b.getAttribute("data-lg");renderLeagues();loadMatches(false);});
  el("refreshBtn").addEventListener("click",function(){loadMatches(true);});
  el("matches").addEventListener("click",function(e){if(e.target.closest("[data-eid]"))return onOddClick(e);var c=e.target.closest("[data-card-eid]");if(c)openDetail(c.getAttribute("data-card-eid"),c.getAttribute("data-card-lg"));});
  el("detContent").addEventListener("click",onOddClick);
  el("liveStrip").addEventListener("click",function(e){if(e.target.closest("[data-eid]"))return onOddClick(e);var c=e.target.closest("[data-card-eid]");if(c)openDetail(c.getAttribute("data-card-eid"),c.getAttribute("data-card-lg"));});
  el("detBack").addEventListener("click",function(){switchScreen("scrMatches");});

  Array.prototype.forEach.call(document.querySelectorAll(".seg .segb"),function(){});
  Array.prototype.forEach.call(document.querySelectorAll('#scrMatches .seg .segb'),function(btn){btn.addEventListener("click",function(){liveOnly=(btn.getAttribute("data-f")==="live");Array.prototype.forEach.call(document.querySelectorAll('#scrMatches .seg .segb'),function(x){x.classList.toggle("on",x===btn);});var e=cache.odds[curLeague];if(e&&e.data){renderMatches(e.data);}});});
  Array.prototype.forEach.call(document.querySelectorAll('#slipModeSeg .segb'),function(btn){btn.addEventListener("click",function(){slipMode=btn.getAttribute("data-mode");Array.prototype.forEach.call(document.querySelectorAll('#slipModeSeg .segb'),function(x){x.classList.toggle("on",x===btn);});renderSlip();});});

  el("addFab").addEventListener("click",openManual);
  el("manualClose").addEventListener("click",closeManual);el("manualBg").addEventListener("click",closeManual);el("manAdd").addEventListener("click",manualAdd);
  el("slipFab").addEventListener("click",openSheet);el("sheetClose").addEventListener("click",closeSheet);el("sheetBg").addEventListener("click",closeSheet);
  el("slipStake").addEventListener("input",renderSlip);
  el("slipItems").addEventListener("click",function(e){var b=e.target.closest("[data-rm]");if(!b)return;slip.splice(parseInt(b.getAttribute("data-rm"),10),1);renderSlip();markSelected();});
  el("placeBtn").addEventListener("click",placeBets);
  el("pending").addEventListener("click",function(e){var w=e.target.closest("[data-win]"),l=e.target.closest("[data-lose]");if(w)resolve(w.getAttribute("data-win"),true);if(l)resolve(l.getAttribute("data-lose"),false);});
  el("goalBanners").addEventListener("click",function(e){var b=e.target.closest("button");if(!b)return;if(b.getAttribute("data-act")==="redeem"){state.redemptions.unshift({id:uid(),treat:state.goal.treat,amount:state.goal.funAmount,at:Date.now()});state.funBalance-=state.goal.funAmount;renderAll();toast("פינוק מומש 🎁");}if(b.getAttribute("data-act")==="bump"){state.goal.saveAmount+=1000;el("inSave").value=state.goal.saveAmount;renderAll();}});
  ["inTreat","inFun","inSave"].forEach(function(id){el(id).addEventListener("input",function(){state.goal.treat=el("inTreat").value;state.goal.funAmount=parseFloat(el("inFun").value)||0;state.goal.saveAmount=parseFloat(el("inSave").value)||0;renderAll();});});
  el("resetBtn").addEventListener("click",function(){if(confirm("לאפס הכל? (יחסים וסמלים שמורים יישארו)")){state=JSON.parse(JSON.stringify(DEFAULT));slip=[];el("inTreat").value=state.goal.treat;el("inFun").value=state.goal.funAmount;el("inSave").value=state.goal.saveAmount;renderSlip();markSelected();renderAll();}});
  var nav=document.querySelectorAll(".navb");for(var i=0;i<nav.length;i++)nav[i].addEventListener("click",function(){switchScreen(this.getAttribute("data-scr"));});

  ensureCrests();           // harvest crests (free, background)
  await loadSports();       // in-season leagues (free)
  await loadMatches(false); // selected league
}
init();
</script>
